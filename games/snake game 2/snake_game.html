<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        body {
            background-color: #202124;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            position: relative;
            overflow: hidden;
            user-select: none;
        }

        /* Main Wrapper */
        .main-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        canvas {
            background-color: #aad751;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            border-radius: 8px;
            margin-bottom: 20px;
        }

        h1 {
            margin: 5px 0 10px 0;
            color: #ffffff;
            font-size: 26px;
        }

        /* Stats Panel */
        .stats {
            display: flex;
            gap: 20px;
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 12px;
            background: #303134;
            padding: 8px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            align-items: center;
        }

        .stat-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .score-row {
            display: flex;
            gap: 12px;
        }

        .stat-item {
            color: #fbbc04;
        }

        #highScore {
            color: #8ab4f8;
        }

        .rank-wrapper {
            padding: 0 15px;
            border-left: 1px solid #5f6368;
            border-right: 1px solid #5f6368;
        }

        #rank {
            transition: color 0.3s ease;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
            font-size: 16px;
        }

        .progress-bg {
            width: 100px;
            height: 6px;
            background: #444;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #2ecc71;
            width: 0%;
            transition: width 0.3s ease;
        }

        /* Realistic D-Pad matching your image */
        .dpad-container {
            display: grid;
            grid-template-columns: 55px 55px 55px;
            grid-template-rows: 55px 55px 55px;
            gap: 8px;
            margin-bottom: 15px;
        }

        .dpad-btn {
            background: #3c4043;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            color: #9aa0a6;
            transition: background 0.05s ease, transform 0.05s ease;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.3);
        }

        /* Active (Clicked) State */
        .dpad-btn.active {
            background: #5f6368;
            color: #ffffff;
            transform: scale(0.9) translateY(2px);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }

        #btnUp {
            grid-column: 2;
            grid-row: 1;
        }

        #btnLeft {
            grid-column: 1;
            grid-row: 2;
        }

        #btnRight {
            grid-column: 3;
            grid-row: 2;
        }

        #btnDown {
            grid-column: 2;
            grid-row: 3;
        }

        /* Mini Speed Controls */
        .controls {
            background: #303134;
            padding: 8px 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        input[type="range"] {
            width: 100px;
            cursor: pointer;
            accent-color: #4285f4;
        }

        .btn {
            background-color: #4285f4;
            color: white;
            border: none;
            border-radius: 4px;
            width: 24px;
            height: 24px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        #speedDisplay {
            font-weight: bold;
            color: #8ab4f8;
            font-size: 13px;
            width: 50px;
            text-align: right;
        }

        /* Secret Control Panel */
        .control-panel {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(32, 33, 36, 0.95);
            border: 1px solid #5f6368;
            padding: 20px;
            border-radius: 10px;
            box-shadow: -5px 0 20px rgba(0, 0, 0, 0.8);
            display: none;
            flex-direction: column;
            gap: 15px;
            width: 200px;
            z-index: 1000;
        }

        .control-panel h3 {
            margin: 0;
            color: #fbbc04;
            text-align: center;
            border-bottom: 1px solid #5f6368;
            padding-bottom: 10px;
        }

        .control-panel label {
            font-size: 12px;
            color: #9aa0a6;
        }

        .control-panel input {
            background: #303134;
            border: 1px solid #5f6368;
            color: white;
            padding: 5px;
            width: 100%;
            border-radius: 4px;
        }

        .control-panel button {
            background: #2ecc71;
            color: #202124;
            font-weight: bold;
            border: none;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
        }

        .secret-mobile-btn {
            position: fixed;
            bottom: 0;
            right: 0;
            width: 50px;
            height: 50px;
            background: transparent;
            z-index: 9999;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="main-wrapper">
        <h1>Snake Game</h1>

        <div class="stats">
            <div class="stat-group score-row">
                <span class="stat-item" id="score">Score: 0</span>
                <span class="stat-item" id="highScore">High: 0</span>
            </div>
            <div class="stat-group rank-wrapper">
                <span id="rank">Silver</span>
                <div class="progress-bg">
                    <div class="progress-fill" id="rankProgress"></div>
                </div>
            </div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <!-- Simulated D-Pad -->
        <div class="dpad-container">
            <div class="dpad-btn" id="btnUp">▲</div>
            <div class="dpad-btn" id="btnLeft">◀</div>
            <div class="dpad-btn" id="btnRight">▶</div>
            <div class="dpad-btn" id="btnDown">▼</div>
        </div>

        <div class="controls">
            <button class="btn" id="btnMinus">−</button>
            <input type="range" id="speedSlider" min="2" max="500" value="40">
            <button class="btn" id="btnPlus">+</button>
            <span id="speedDisplay">40 FPS</span>
        </div>
    </div>

    <div class="control-panel" id="adminPanel">
        <h3>Streamer Panel</h3>
        <div style="display: none;">
            <div><label>Death Target Score:</label><input type="number" id="deathTarget" value="0"></div>
            <div><label>Win Target Score:</label><input type="number" id="winTarget" value="0"></div>
            <div><label>Loop Tolerance (Moves):</label><input type="number" id="loopTarget" value="400"></div>
        </div>
        <div style="display: flex; align-items: center; gap: 5px;">
            <input type="checkbox" id="autoStreamerToggle" style="width: auto;">
            <label style="color: #fbbc04; font-weight: bold; font-size: 13px;">Auto-Streamer Mode</label>
        </div>

        <div id="cycleConfig" style="display: none; flex-direction: column; gap: 8px; font-size: 11px;">
            <div style="color: #9aa0a6; font-weight: bold; margin-bottom: 2px;">Target Cycle Configuration:</div>

            <div style="display: flex; justify-content: space-between; align-items: center;">
                <label>Win (Rank Master+):</label>
                <input type="range" id="cycleWin" min="0" max="5" value="1" style="width: 70px;">
                <span id="cycleWinVal" style="width: 15px; text-align: right; color: #8ab4f8;">1</span>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center;">
                <label>Death @ Grandmaster:</label>
                <input type="range" id="cycleGM" min="0" max="5" value="2" style="width: 70px;">
                <span id="cycleGMVal" style="width: 15px; text-align: right; color: #8ab4f8;">2</span>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center;">
                <label>Death @ Heroic:</label>
                <input type="range" id="cycleHeroic" min="0" max="5" value="1" style="width: 70px;">
                <span id="cycleHeroicVal" style="width: 15px; text-align: right; color: #8ab4f8;">1</span>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center;">
                <label>Death @ Diamond:</label>
                <input type="range" id="cycleDiamond" min="0" max="5" value="0" style="width: 70px;">
                <span id="cycleDiamondVal" style="width: 15px; text-align: right; color: #8ab4f8;">0</span>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center;">
                <label>Death @ Platinum:</label>
                <input type="range" id="cyclePlatinum" min="0" max="5" value="0" style="width: 70px;">
                <span id="cyclePlatinumVal" style="width: 15px; text-align: right; color: #8ab4f8;">0</span>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center;">
                <label>Death @ Gold:</label>
                <input type="range" id="cycleGold" min="0" max="5" value="1" style="width: 70px;">
                <span id="cycleGoldVal" style="width: 15px; text-align: right; color: #8ab4f8;">1</span>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center;">
                <label>Death @ Silver:</label>
                <input type="range" id="cycleSilver" min="0" max="5" value="0" style="width: 70px;">
                <span id="cycleSilverVal" style="width: 15px; text-align: right; color: #8ab4f8;">0</span>
            </div>
        </div>

        <div id="autoStreamerStatus"
            style="font-size: 11px; color: #8ab4f8; font-weight: bold; background: #303134; padding: 5px; border-radius: 4px; text-align: center; margin-top: 5px;">
            Status: Disabled</div>
        <button id="closePanelBtn">Save & Hide</button>
    </div>

    <!-- Hidden Mobile Button for Streamer Panel -->
    <div class="secret-mobile-btn" id="secretMobileBtn"
        style="left: 0; right: auto; top: 50%; transform: translateY(-50%); width: 60px; height: 100px;"></div>

    <script>
        // --- Web Audio API for Sound Effects ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let audioInitialized = false;

        // ব্রাউজারের অডিও আনলক করার জন্য ইভেন্ট
        function initAudio() {
            if (!audioInitialized) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                audioInitialized = true;
            }
        }
        window.addEventListener('click', initAudio);
        window.addEventListener('keydown', initAudio);

        // মেকানিক্যাল বাটন ক্লিক সাউন্ড
        function playClickSound() {
            if (!audioInitialized) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.04);
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime); // Sound volume
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.04);
            osc.start(); osc.stop(audioCtx.currentTime + 0.04);
        }

        // আপেল খাওয়ার সাউন্ড
        function playEatSound() {
            if (!audioInitialized) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(500, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        // --- Variables & Logic ---
        const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score'); const highScoreElement = document.getElementById('highScore');
        const rankElement = document.getElementById('rank'); const rankProgress = document.getElementById('rankProgress');
        const speedSlider = document.getElementById('speedSlider'); const speedDisplay = document.getElementById('speedDisplay');
        const adminPanel = document.getElementById('adminPanel'); const secretMobileBtn = document.getElementById('secretMobileBtn');

        const gridSize = 20; const tileCount = canvas.width / gridSize;
        let snake = []; let foods = []; const MAX_FOODS = 3;

        let score = 0; let highestScore = localStorage.getItem('snakeHighScore') || 0;
        highScoreElement.innerText = `High: ${highestScore}`;

        let targetDeathScore = 0; let targetWinScore = 0; let loopTolerance = 400; let movesWithoutEating = 0;

        let logicAccumulator = 0; let lastTime = 0; let previousTail = null; let ateFoodThisFrame = false;
        let isAuto = true; let gameState = 'PLAYING';
        let manualDir = { x: 1, y: 0 }; let nextManualDir = { x: 1, y: 0 };
        let screenTimestamp = 0; let screenTimeLeft = 0;

        const ranks = [
            { name: "Silver", min: 0, color: "#bdc3c7" }, { name: "Gold", min: 100, color: "#f1c40f" },
            { name: "Platinum", min: 250, color: "#1abc9c" }, { name: "Diamond", min: 450, color: "#9b59b6" },
            { name: "Heroic", min: 750, color: "#e74c3c" }, { name: "Master", min: 1200, color: "#e67e22" },
            { name: "Grandmaster", min: 1800, color: "#ff9f43" }
        ];

        function updateRank() {
            let currentRank = ranks[0], nextRank = null;
            for (let i = 0; i < ranks.length; i++) { if (score >= ranks[i].min) { currentRank = ranks[i]; nextRank = ranks[i + 1] || null; } }
            rankElement.innerText = currentRank.name; rankElement.style.color = currentRank.color; rankProgress.style.backgroundColor = currentRank.color;
            if (!nextRank) { rankElement.style.textShadow = "0 0 10px #ff9f43"; rankProgress.style.width = '100%'; }
            else { rankElement.style.textShadow = "none"; rankProgress.style.width = `${((score - currentRank.min) / (nextRank.min - currentRank.min)) * 100}%`; }
        }

        function updateSpeedDisplay() {
            let fps = parseInt(speedSlider.value);
            if (fps < 10) speedDisplay.innerText = "Slow"; else if (fps >= 500) speedDisplay.innerText = "MAX"; else speedDisplay.innerText = fps + " FPS";
            localStorage.setItem('snakeGameSpeed', fps);
        }

        let savedSpeed = localStorage.getItem('snakeGameSpeed');
        if (savedSpeed !== null) {
            speedSlider.value = savedSpeed;
        }
        updateSpeedDisplay();

        speedSlider.addEventListener('input', updateSpeedDisplay);
        document.getElementById('btnMinus').addEventListener('click', () => { speedSlider.value = Math.max(parseInt(speedSlider.min), parseInt(speedSlider.value) - 1); updateSpeedDisplay(); });
        document.getElementById('btnPlus').addEventListener('click', () => { speedSlider.value = Math.min(parseInt(speedSlider.max), parseInt(speedSlider.value) + 1); updateSpeedDisplay(); });

        function toggleAdminPanel() { adminPanel.style.display = (adminPanel.style.display === 'flex') ? 'none' : 'flex'; }

        let cycleIndex = 0;
        let dynamicScript = [];

        function buildDynamicScript() {
            dynamicScript = [];
            let wCount = parseInt(document.getElementById('cycleWin').value) || 0;
            let gmCount = parseInt(document.getElementById('cycleGM').value) || 0;
            let heroicCount = parseInt(document.getElementById('cycleHeroic').value) || 0;
            let diamondCount = parseInt(document.getElementById('cycleDiamond').value) || 0;
            let platCount = parseInt(document.getElementById('cyclePlatinum').value) || 0;
            let goldCount = parseInt(document.getElementById('cycleGold').value) || 0;
            let silverCount = parseInt(document.getElementById('cycleSilver').value) || 0;

            for (let i = 0; i < wCount; i++) dynamicScript.push({ type: "WIN", text: "Next: Epic Win (Almost Full Board)" });
            for (let i = 0; i < gmCount; i++) dynamicScript.push({ type: "FAIL", targetDeathMin: 1820, targetDeathMax: 1950, rank: "Grandmaster" });
            for (let i = 0; i < heroicCount; i++) dynamicScript.push({ type: "FAIL", targetDeathMin: 850, targetDeathMax: 1100, rank: "Heroic" });
            for (let i = 0; i < diamondCount; i++) dynamicScript.push({ type: "FAIL", targetDeathMin: 470, targetDeathMax: 700, rank: "Diamond" });
            for (let i = 0; i < platCount; i++) dynamicScript.push({ type: "FAIL", targetDeathMin: 270, targetDeathMax: 420, rank: "Platinum" });
            for (let i = 0; i < goldCount; i++) dynamicScript.push({ type: "FAIL", targetDeathMin: 120, targetDeathMax: 220, rank: "Gold" });
            for (let i = 0; i < silverCount; i++) dynamicScript.push({ type: "FAIL", targetDeathMin: 40, targetDeathMax: 90, rank: "Silver" });

            // Default failsafe if script is empty
            if (dynamicScript.length === 0) {
                dynamicScript.push({ type: "WIN", text: "Next: Epic Win (Almost Full Board)" });
            }
        }

        // Setup slider values text update and save
        const sliderIds = ['cycleWin', 'cycleGM', 'cycleHeroic', 'cycleDiamond', 'cyclePlatinum', 'cycleGold', 'cycleSilver'];
        sliderIds.forEach(id => {
            let el = document.getElementById(id);
            let valEl = document.getElementById(id + "Val");

            // Load saved
            let saved = localStorage.getItem('snakeAuto_' + id);
            if (saved !== null) { el.value = saved; }
            valEl.innerText = el.value;

            el.addEventListener('input', () => {
                valEl.innerText = el.value;
                localStorage.setItem('snakeAuto_' + id, el.value);
                buildDynamicScript();
                cycleIndex = 0; // reset cycle on config change
                planNextAutoStreamerGame();
            });
        });

        const autoToggleEl = document.getElementById('autoStreamerToggle');
        const cycleConfigEl = document.getElementById('cycleConfig');

        let savedToggle = localStorage.getItem('snakeAuto_toggle');
        if (savedToggle === 'true') {
            autoToggleEl.checked = true;
            cycleConfigEl.style.display = 'flex';
        }

        autoToggleEl.addEventListener('change', () => {
            cycleConfigEl.style.display = autoToggleEl.checked ? 'flex' : 'none';
            localStorage.setItem('snakeAuto_toggle', autoToggleEl.checked);
            cycleIndex = 0;
            planNextAutoStreamerGame();
        });


        function planNextAutoStreamerGame() {
            let autoToggle = document.getElementById('autoStreamerToggle');
            let statusDisplay = document.getElementById('autoStreamerStatus');
            if (!autoToggle) return;
            if (!autoToggle.checked) {
                statusDisplay.innerText = "Status: Disabled";
                return;
            }

            if (dynamicScript.length === 0) buildDynamicScript();
            if (cycleIndex >= dynamicScript.length) cycleIndex = 0;

            let currentStep = dynamicScript[cycleIndex];

            if (currentStep.type === "WIN") {
                targetDeathScore = 0;

                // 20x20 grid = 400 total tiles.
                // Initial snake 5. Total possible food = 395. Score = 3950.
                // 10 to 15 steps less = (380 to 385 score range)
                let maxScore = 3950;
                let stepsLess = Math.floor(Math.random() * 6) + 10; // Random number from 10 to 15
                targetWinScore = maxScore - (stepsLess * 10);

                statusDisplay.innerText = currentStep.text + ` (~${targetWinScore})`;
            } else {
                targetWinScore = 0;
                let plannedDeathScore = Math.floor(Math.random() * ((currentStep.targetDeathMax - currentStep.targetDeathMin) / 10 + 1)) * 10 + currentStep.targetDeathMin;
                targetDeathScore = plannedDeathScore;
                statusDisplay.innerText = `Next: Fake Death @ ${currentStep.rank} (~${plannedDeathScore})`;
            }

            document.getElementById('deathTarget').value = targetDeathScore;
            document.getElementById('winTarget').value = targetWinScore;
        }

        function updateCycleAfterGame() {
            let autoToggle = document.getElementById('autoStreamerToggle');
            if (autoToggle && !autoToggle.checked) return;

            cycleIndex++;
            if (cycleIndex >= dynamicScript.length) {
                cycleIndex = 0;
            }
            planNextAutoStreamerGame();
        }

        document.getElementById('autoStreamerToggle').addEventListener('change', planNextAutoStreamerGame);
        setTimeout(planNextAutoStreamerGame, 100);

        document.getElementById('closePanelBtn').addEventListener('click', () => {
            targetDeathScore = parseInt(document.getElementById('deathTarget').value) || 0;
            targetWinScore = parseInt(document.getElementById('winTarget').value) || 0;
            loopTolerance = parseInt(document.getElementById('loopTarget').value) || 400;
            if (document.getElementById('autoStreamerToggle').checked) {
                planNextAutoStreamerGame();
            }
            toggleAdminPanel();
        });

        // Double Tap Logic for Hidden Mobile Button
        let clickTimer = null;
        secretMobileBtn.addEventListener('click', (e) => {
            if (clickTimer === null) {
                // First click - start timer
                clickTimer = setTimeout(() => {
                    clickTimer = null; // Reset if no second click within 300ms
                }, 300);
            } else {
                // Second click within 300ms - It's a double tap!
                clearTimeout(clickTimer);
                clickTimer = null;
                toggleAdminPanel();
                e.preventDefault();
            }
        });

        // Add additional dblclick listener for Desktop support just in case
        secretMobileBtn.addEventListener('dblclick', (e) => {
            toggleAdminPanel();
            e.preventDefault();
        });

        let lastKey = ''; let lastKeyTime = 0;
        window.addEventListener('keydown', (e) => {
            let key = e.key.toLowerCase(); let now = Date.now();
            if (key === lastKey && now - lastKeyTime < 400) {
                if (key === 'a') { isAuto = true; gameState = 'PLAYING'; }
                if (key === 'm') { isAuto = false; gameState = 'PAUSED'; nextManualDir = { x: snake[0].x - snake[1].x, y: snake[0].y - snake[1].y }; }
                if (key === 'c') { toggleAdminPanel(); }
            }
            lastKey = key; lastKeyTime = now;
            if (!isAuto && gameState !== 'GAMEOVER' && gameState !== 'WIN') {
                let moved = false;
                if (key === 'w' || key === 'arrowup') { if (manualDir.y === 0) { nextManualDir = { x: 0, y: -1 }; moved = true; } }
                else if (key === 's' || key === 'arrowdown') { if (manualDir.y === 0) { nextManualDir = { x: 0, y: 1 }; moved = true; } }
                else if (key === 'a' || key === 'arrowleft') { if (manualDir.x === 0) { nextManualDir = { x: -1, y: 0 }; moved = true; } }
                else if (key === 'd' || key === 'arrowright') { if (manualDir.x === 0) { nextManualDir = { x: 1, y: 0 }; moved = true; } }
                if (moved && gameState === 'PAUSED') gameState = 'PLAYING';
            }
        });

        // --- D-Pad Sync Animation ---
        function highlightDpad(dx, dy) {
            document.querySelectorAll('.dpad-btn').forEach(b => b.classList.remove('active'));
            let btn = null;
            if (dx === 1) btn = document.getElementById('btnRight');
            else if (dx === -1) btn = document.getElementById('btnLeft');
            else if (dy === 1) btn = document.getElementById('btnDown');
            else if (dy === -1) btn = document.getElementById('btnUp');

            if (btn) {
                btn.classList.add('active');
                setTimeout(() => btn.classList.remove('active'), 120); // 120ms animation delay
            }
        }

        function initGame() {
            snake = [{ x: 10, y: 10 }, { x: 10, y: 11 }, { x: 10, y: 12 }, { x: 10, y: 13 }, { x: 10, y: 14 }];
            previousTail = { x: 10, y: 15 }; foods = []; ateFoodThisFrame = false; score = 0; movesWithoutEating = 0;
            scoreElement.innerText = `Score: ${score}`; gameState = isAuto ? 'PLAYING' : 'PAUSED';
            updateRank(); logicAccumulator = 0; updateSpeedDisplay(); placeFood();
        }

        function placeFood() {
            while (foods.length < MAX_FOODS) {
                let emptySpots = [];
                for (let x = 0; x < tileCount; x++) {
                    for (let y = 0; y < tileCount; y++) {
                        if (!snake.some(s => s.x === x && s.y === y) && !foods.some(f => f.x === x && f.y === y)) emptySpots.push({ x, y });
                    }
                }
                if (emptySpots.length > 0) foods.push(emptySpots[Math.floor(Math.random() * emptySpots.length)]); else break;
            }
        }

        function bfs(start, target, obstacles) {
            let queue = [[start]]; let visited = new Set(); visited.add(`${start.x},${start.y}`);
            let obstacleSet = new Set(obstacles.map(p => `${p.x},${p.y}`));
            while (queue.length > 0) {
                let path = queue.shift(); let current = path[path.length - 1];
                if (current.x === target.x && current.y === target.y) return path;
                let neighbors = [{ x: current.x, y: current.y - 1 }, { x: current.x, y: current.y + 1 }, { x: current.x - 1, y: current.y }, { x: current.x + 1, y: current.y }];
                for (let n of neighbors) {
                    if (n.x >= 0 && n.x < tileCount && n.y >= 0 && n.y < tileCount) {
                        let key = `${n.x},${n.y}`;
                        if (!visited.has(key) && !obstacleSet.has(key)) { visited.add(key); queue.push([...path, n]); }
                    }
                }
            }
            return null;
        }

        function getBestAutoMove() {
            let head = snake[0];

            if (targetDeathScore > 0 && score >= targetDeathScore) {
                let neighbors = [{ x: head.x, y: head.y - 1 }, { x: head.x, y: head.y + 1 }, { x: head.x - 1, y: head.y }, { x: head.x + 1, y: head.y }];
                for (let n of neighbors) { if (n.x < 0 || n.y < 0 || n.x >= tileCount || n.y >= tileCount || snake.some(s => s.x === n.x && s.y === n.y)) return n; }
            }

            let bestPath = null;
            for (let food of foods) {
                let pathToFood = bfs(head, food, snake);
                if (pathToFood && pathToFood.length > 1) {
                    let finalState = []; for (let i = pathToFood.length - 1; i >= 0; i--) finalState.push(pathToFood[i]);
                    let remainingLen = snake.length + 1 - finalState.length;
                    for (let i = 1; i <= remainingLen; i++) if (i < snake.length) finalState.push(snake[i]);
                    let pathToTailAfterEating = bfs(finalState[0], finalState[finalState.length - 1], finalState.slice(0, -1));
                    if (pathToTailAfterEating || finalState.length < 5) {
                        if (!bestPath || pathToFood.length < bestPath.length) bestPath = pathToFood;
                    }
                }
            }
            if (bestPath) return bestPath[1];

            let neighbors = [{ x: head.x, y: head.y - 1 }, { x: head.x, y: head.y + 1 }, { x: head.x - 1, y: head.y }, { x: head.x + 1, y: head.y }];
            let safeMoves = [];
            for (let n of neighbors) {
                if (n.x >= 0 && n.x < tileCount && n.y >= 0 && n.y < tileCount) {
                    let isCrash = snake.slice(0, -1).some(s => s.x === n.x && s.y === n.y);
                    if (!isCrash) {
                        let tempSnake = [n, ...snake.slice(0, -1)];
                        let pToTail = bfs(tempSnake[0], tempSnake[tempSnake.length - 1], tempSnake.slice(0, -1));
                        if (pToTail) safeMoves.push({ move: n, dist: pToTail.length });
                    }
                }
            }
            if (safeMoves.length > 0) { safeMoves.sort((a, b) => b.dist - a.dist); return safeMoves[0].move; }
            for (let n of neighbors) {
                if (n.x >= 0 && n.x < tileCount && n.y >= 0 && n.y < tileCount) { if (!snake.some(s => s.x === n.x && s.y === n.y)) return n; }
            }
            return head;
        }

        function checkSaveScore() { if (score > highestScore) { highestScore = score; localStorage.setItem('snakeHighScore', highestScore); highScoreElement.innerText = `High: ${highestScore}`; } }
        function handleGameOver() { checkSaveScore(); updateCycleAfterGame(); gameState = 'GAMEOVER'; screenTimestamp = Date.now(); screenTimeLeft = 5; }
        function handleWin() { checkSaveScore(); updateCycleAfterGame(); gameState = 'WIN'; screenTimestamp = Date.now(); screenTimeLeft = 5; }

        function update() {
            let nextMove;
            if (isAuto) nextMove = getBestAutoMove();
            else { manualDir = nextManualDir; nextMove = { x: snake[0].x + manualDir.x, y: snake[0].y + manualDir.y }; }

            let newHead = { x: nextMove.x, y: nextMove.y };

            // --- Turn Detection & Sound Sync ---
            let currentDirX = snake[0].x - snake[1].x;
            let currentDirY = snake[0].y - snake[1].y;
            let nextDirX = newHead.x - snake[0].x;
            let nextDirY = newHead.y - snake[0].y;

            // যদি সাপ দিক পরিবর্তন করে, তবেই বাটন এনিমেশন এবং টিক সাউন্ড হবে (মানুষের মতো)
            if (currentDirX !== nextDirX || currentDirY !== nextDirY) {
                highlightDpad(nextDirX, nextDirY);
                playClickSound();
            }

            if (newHead.x < 0 || newHead.x >= tileCount || newHead.y < 0 || newHead.y >= tileCount) { handleGameOver(); return; }

            let foodIndex = foods.findIndex(f => f.x === newHead.x && f.y === newHead.y);
            let willGrow = (foodIndex !== -1);
            let checkLen = willGrow ? snake.length : snake.length - 1;

            for (let i = 0; i < checkLen; i++) { if (newHead.x === snake[i].x && newHead.y === snake[i].y && snake.length > 3) { handleGameOver(); return; } }

            previousTail = { ...snake[snake.length - 1] }; ateFoodThisFrame = willGrow;
            snake.unshift(newHead);

            if (willGrow) {
                playEatSound(); // খাবার খাওয়ার সাউন্ড
                score += 10; movesWithoutEating = 0; scoreElement.innerText = `Score: ${score}`;
                updateRank(); foods.splice(foodIndex, 1); placeFood();
                if (targetWinScore > 0 && score >= targetWinScore) { handleWin(); return; }
            } else {
                snake.pop(); movesWithoutEating++;
                if (movesWithoutEating >= loopTolerance) { handleWin(); return; }
            }
        }

        function lerp(start, end, t) { return start + (end - start) * t; }

        function draw(progress, time) {
            for (let r = 0; r < tileCount; r++) {
                for (let c = 0; c < tileCount; c++) {
                    ctx.fillStyle = (r + c) % 2 === 0 ? '#aad751' : '#a2d149'; ctx.fillRect(c * gridSize, r * gridSize, gridSize, gridSize);
                }
            }
            let pulse = 1 + Math.sin(time / 200) * 0.05; let fRadius = (gridSize / 2.3) * pulse;
            for (let food of foods) {
                let fX = food.x * gridSize + gridSize / 2; let fY = food.y * gridSize + gridSize / 2;
                ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.arc(fX + 2, fY + 2, fRadius, 0, Math.PI * 2); ctx.fill();
                let grad = ctx.createRadialGradient(fX - fRadius / 3, fY - fRadius / 3, fRadius / 8, fX, fY, fRadius);
                grad.addColorStop(0, '#ff7675'); grad.addColorStop(0.5, '#d63031'); grad.addColorStop(1, '#8b0000');
                ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(fX, fY, fRadius, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = '#5c4033'; ctx.lineWidth = 2; ctx.lineCap = "round";
                ctx.beginPath(); ctx.moveTo(fX, fY - fRadius + 2); ctx.lineTo(fX + 3, fY - fRadius - 5); ctx.stroke();
                ctx.fillStyle = '#2ecc71'; ctx.beginPath(); ctx.ellipse(fX + 5, fY - fRadius - 2, 4, 2, Math.PI / 4, 0, Math.PI * 2); ctx.fill();
            }

            let visSnake = [{ x: lerp(snake[1].x, snake[0].x, progress), y: lerp(snake[1].y, snake[0].y, progress) }];
            for (let i = 1; i < snake.length; i++) visSnake.push({ x: snake[i].x, y: snake[i].y });
            if (!ateFoodThisFrame && previousTail) { visSnake.push({ x: lerp(previousTail.x, snake[snake.length - 1].x, progress), y: lerp(previousTail.y, snake[snake.length - 1].y, progress) }); }

            ctx.lineCap = "round"; ctx.lineJoin = "round";
            for (let i = visSnake.length - 1; i >= 0; i--) {
                let p1 = visSnake[i]; let drawX = p1.x * gridSize + gridSize / 2; let drawY = p1.y * gridSize + gridSize / 2;
                let ratio = i / Math.max(1, visSnake.length - 1);
                let r = Math.round(lerp(21, 150, ratio)); let g = Math.round(lerp(101, 200, ratio)); let b = Math.round(lerp(192, 250, ratio));
                ctx.fillStyle = `rgb(${r}, ${g}, ${b})`; ctx.strokeStyle = `rgb(${r}, ${g}, ${b})`;

                let thicknessRatio = lerp(0.9, 0.3, ratio); let currentRadius = (gridSize / 2) * thicknessRatio;
                if (i === 0) currentRadius *= 1.1;

                ctx.beginPath(); ctx.arc(drawX, drawY, currentRadius, 0, Math.PI * 2); ctx.fill();

                if (i > 0) {
                    let p2 = visSnake[i - 1]; let drawX2 = p2.x * gridSize + gridSize / 2; let drawY2 = p2.y * gridSize + gridSize / 2;
                    let nextRadius = (gridSize / 2) * lerp(0.9, 0.3, (i - 1) / Math.max(1, visSnake.length - 1));
                    if (i - 1 === 0) nextRadius *= 1.1;
                    ctx.lineWidth = currentRadius + nextRadius; ctx.beginPath(); ctx.moveTo(drawX, drawY); ctx.lineTo(drawX2, drawY2); ctx.stroke();
                }
                if (i === 0) {
                    let dirX = snake[0].x - snake[1].x; let dirY = snake[0].y - snake[1].y;
                    let tongueFlick = Math.abs(Math.sin(time / 150)) * 8;
                    ctx.strokeStyle = '#ff4757'; ctx.lineWidth = 1.5; ctx.beginPath();
                    let tStartX = drawX + (dirX * currentRadius); let tStartY = drawY + (dirY * currentRadius);
                    ctx.moveTo(tStartX, tStartY); ctx.lineTo(tStartX + (dirX * tongueFlick), tStartY + (dirY * tongueFlick));
                    ctx.lineTo(tStartX + (dirX * tongueFlick) + (dirY * 2), tStartY + (dirY * tongueFlick) + (dirX * 2));
                    ctx.moveTo(tStartX + (dirX * tongueFlick), tStartY + (dirY * tongueFlick));
                    ctx.lineTo(tStartX + (dirX * tongueFlick) - (dirY * 2), tStartY + (dirY * tongueFlick) - (dirX * 2)); ctx.stroke();

                    let e1X, e1Y, e2X, e2Y; let offset = currentRadius * 0.5;
                    if (dirX > 0) { e1X = drawX + offset / 2; e1Y = drawY - offset; e2X = drawX + offset / 2; e2Y = drawY + offset; }
                    else if (dirX < 0) { e1X = drawX - offset / 2; e1Y = drawY - offset; e2X = drawX - offset / 2; e2Y = drawY + offset; }
                    else if (dirY > 0) { e1X = drawX - offset; e1Y = drawY + offset / 2; e2X = drawX + offset; e2Y = drawY + offset / 2; }
                    else { e1X = drawX - offset; e1Y = drawY - offset / 2; e2X = drawX + offset; e2Y = drawY - offset / 2; }
                    ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(e1X, e1Y, 3.5, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(e2X, e2Y, 3.5, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = '#2f3640'; ctx.beginPath(); ctx.arc(e1X + (dirX * 1.5), e1Y + (dirY * 1.5), 2, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(e2X + (dirX * 1.5), e2Y + (dirY * 1.5), 2, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(e1X + (dirX * 1.5) - 0.5, e1Y + (dirY * 1.5) - 0.5, 0.8, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(e2X + (dirX * 1.5) - 0.5, e2Y + (dirY * 1.5) - 0.5, 0.8, 0, Math.PI * 2); ctx.fill();
                }
            }
        }

        function gameLoop(time) {
            requestAnimationFrame(gameLoop);

            if (gameState === 'GAMEOVER' || gameState === 'WIN') {
                let passed = Math.floor((Date.now() - screenTimestamp) / 1000);
                screenTimeLeft = 5 - passed;
                draw(1, time);
                ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = gameState === 'WIN' ? "#f1c40f" : "#e74c3c";
                ctx.font = "bold 36px Arial"; ctx.textAlign = "center";
                ctx.fillText(gameState === 'WIN' ? "YOU WIN!" : "GAME OVER", canvas.width / 2, canvas.height / 2 - 30);

                ctx.fillStyle = "white"; ctx.font = "20px Arial";
                ctx.fillText(`Score: ${score}  |  High Score: ${highestScore}`, canvas.width / 2, canvas.height / 2 + 10);

                ctx.fillStyle = "#8ab4f8"; ctx.font = "18px Arial";
                ctx.fillText(`Restarting in ${screenTimeLeft}s...`, canvas.width / 2, canvas.height / 2 + 50);

                if (screenTimeLeft <= 0) initGame();
                return;
            }

            if (!lastTime) lastTime = time; let deltaTime = time - lastTime; lastTime = time;
            let fps = parseInt(speedSlider.value); let logicDelay = 1000 / fps;

            if (gameState === 'PAUSED') {
                draw(1, time);
                ctx.fillStyle = "rgba(0,0,0,0.4)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white"; ctx.font = "bold 30px Arial"; ctx.textAlign = "center";
                ctx.fillText("PAUSED", canvas.width / 2, canvas.height / 2);
                return;
            }

            logicAccumulator += deltaTime;
            if (logicAccumulator > 1000) logicAccumulator = logicDelay;

            while (logicAccumulator >= logicDelay) { update(); logicAccumulator -= logicDelay; }
            draw(logicAccumulator / logicDelay, time);
        }

        initGame(); requestAnimationFrame(gameLoop);

    </script>
</body>
